  # ───────────────────────────── ИИ-гид ──────────────────────────────────
  /guide/story:
    post:
      tags: [ИИ-гид]
      summary: Сгенерировать рассказ об экспонате
      description: |
        Cloud Function берёт `raw_history` экспоната из БД и формирует промпт
        для **YandexGPT**:

        > «Напиши интересную историю для посетителя музея, используя данные:
        > `{raw_history}`, стиль: `{style}`, год: `{year_created}`.»

        Возвращает связный рассказ и **3–4 контекстных вопроса-подсказки**
        (всплывающие подсказки внизу чата для продолжения диалога). По флагу
        `include_audio` сразу прикладывает ссылку на озвучку (SpeechKit).

        Укажите **`exhibit_id` или `label_slug`** (хотя бы одно). `label_slug`
        удобен сразу после распознавания.
      operationId: generateStory
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoryRequest'
            examples:
              afterRecognition:
                summary: После распознавания (по label_slug)
                value:
                  label_slug: faberge_egg_coronation
                  style: engaging
                  language: ru
                  include_audio: false
                  max_questions: 4
      responses:
        '200':
          description: Сгенерированный рассказ и подсказки.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoryResponse'
              examples:
                story:
                  summary: Рассказ о Коронационном яйце
                  value:
                    exhibit_id: 101
                    label_slug: faberge_egg_coronation
                    style: engaging
                    text: >-
                      В 1897 году Карл Фаберже исполнил для Николая II особый
                      пасхальный подарок императрице Александре Фёдоровне…
                    suggested_questions:
                      - Сколько времени ушло на создание?
                      - Кому подарили это яйцо?
                      - Что за сюрприз спрятан внутри?
                      - Какие материалы использовал мастер?
                    audio_url: null
                    model: yandexgpt/latest
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '502':
          $ref: '#/components/responses/UpstreamError'

  /guide/chat:
    post:
      tags: [ИИ-гид]
      summary: Диалог с ИИ-гидом
      description: |
        Многоходовой диалог с гидом. Контекст задаётся экспонатом
        (`exhibit_id`/`label_slug`) либо залом (`hall_id` — для кнопки
        «Спросить AI-гида» на уровне зала). Часто `message` — это один из
        ранее предложенных `suggested_questions`.

        Состояние диалога хранится по `session_id`: если он не передан, сервер
        создаёт новый и возвращает его. Альтернативно можно передавать
        историю сообщений в `history`. Ответ снова содержит набор
        контекстных вопросов-подсказок.
      operationId: chatWithGuide
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
            examples:
              followUp:
                summary: Уточняющий вопрос по экспонату
                value:
                  session_id: 2f6a9b3c-1d4e-4f8a-9c2b-5e7a1d0c3b66
                  context:
                    exhibit_id: 101
                  message: Кому подарили это яйцо?
      responses:
        '200':
          description: Ответ гида и новые подсказки.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
              examples:
                answer:
                  summary: Ответ на уточняющий вопрос
                  value:
                    session_id: 2f6a9b3c-1d4e-4f8a-9c2b-5e7a1d0c3b66
                    answer: >-
                      Это яйцо Николай II подарил своей супруге, императрице
                      Александре Фёдоровне, на Пасху 1897 года…
                    suggested_questions:
                      - А что подарили его матери?
                      - Где оно хранилось после революции?
                      - Сколько таких яиц всего создал Фаберже?
                    context:
                      exhibit_id: 101
                      label_slug: faberge_egg_coronation
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '502':
          $ref: '#/components/responses/UpstreamError'

  # ──────────────────────────── Озвучивание ──────────────────────────────
  /speech:
    post:
      tags: [Озвучивание]
      summary: Синтез речи (Прослушать)
      description: |
        Озвучивает текст через **Yandex SpeechKit** для кнопки «Прослушать».
        Принимает либо произвольный `text`, либо `exhibit_id` (тогда озвучивается
        краткое описание экспоната). Возвращает ссылку на аудио в Object Storage
        (раздаётся через CDN); часто используемые описания кэшируются.

        Кнопка «Прослушать» на фронте имеет состояния **Play / Pause / Loading** —
        `Loading` соответствует ожиданию ответа этого эндпоинта.
      operationId: synthesizeSpeech
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SpeechRequest'
            examples:
              byText:
                summary: Озвучить произвольный текст
                value:
                  text: В 1897 году Карл Фаберже исполнил Коронационное яйцо…
                  voice: alena
                  format: mp3
                  speed: 1.0
              byExhibit:
                summary: Озвучить описание экспоната
                value:
                  exhibit_id: 101
                  voice: filipp
                  format: oggopus
      responses:
        '200':
          description: Ссылка на синтезированное аудио.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpeechResponse'
              examples:
                ok:
                  summary: Готовое аудио
                  value:
                    audio_url: https://cdn.example.cloud/tts/coronation_alena.mp3
                    format: mp3
                    voice: alena
                    duration_ms: 21400
                    characters: 248
                    cached: true
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '502':
          $ref: '#/components/responses/UpstreamError'

