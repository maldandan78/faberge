  /admin/exhibits/{exhibit_id}/media/{image_id}:
    delete:
      tags: [Администрирование]
      summary: Удалить фото экспоната
      description: >-
        Удаляет изображение из галереи экспоната и сам объект из Object Storage.
        Если удаляется главное изображение, ссылка снимается с карточки.
      operationId: deleteExhibitMedia
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ExhibitId'
        - name: image_id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
          description: Идентификатор изображения в галерее экспоната.
      responses:
        '204':
          description: Изображение удалено.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /admin/analytics/overview:
    get:
      tags: [Администрирование]
      summary: '[Вне MVP] Сводная аналитика'
      description: >-
        Агрегированные показатели использования за период: сессии,
        распознавания, доля успешных распознаваний, сообщения в чате,
        прослушивания аудио, топ экспонатов и залов.
      operationId: getAnalyticsOverview
      security:
        - bearerAuth: []
      parameters:
        - name: from
          in: query
          description: Начало периода (ISO-8601 дата).
          required: false
          schema:
            type: string
            format: date
          example: '2026-05-25'
        - name: to
          in: query
          description: Конец периода (ISO-8601 дата).
          required: false
          schema:
            type: string
            format: date
          example: '2026-06-25'
      responses:
        '200':
          description: Сводные показатели.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyticsOverview'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  # ───────────────────────── Телеметрия [вне MVP] ────────────────────────
  /telemetry/events:
    post:
      tags: [Телеметрия]
      summary: '[Вне MVP] Отправить события'
      description: >-
        Пакетный приём анонимных пользовательских событий (просмотр экспоната,
        распознавание, сообщение в чате, прослушивание) — источник данных для
        административной аналитики.
      operationId: ingestEvents
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventBatch'
      responses:
        '202':
          description: События приняты в обработку.
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: >-
        Статический Bearer-токен администратора (получается через
        `POST /admin/login`). Слать в заголовке `Authorization: Bearer <token>`
        ко всем эндпоинтам `/admin/**` (кроме `/admin/login`).

  parameters:
    Limit:
      name: limit
      in: query
      description: Максимум элементов на странице.
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Offset:
      name: offset
      in: query
      description: Смещение от начала выборки (постраничность).
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
    HallId:
      name: hall_id
      in: path
      required: true
      description: Идентификатор зала.
      schema:
        type: integer
        minimum: 1
      example: 5
    ShowcaseId:
      name: showcase_id
      in: path
      required: true
      description: Идентификатор витрины.
      schema:
        type: integer
        minimum: 1
      example: 12
    ExhibitId:
      name: exhibit_id
      in: path
      required: true
      description: Идентификатор экспоната.
      schema:
        type: integer
        minimum: 1
      example: 101
    LabelSlug:
      name: label_slug
      in: path
      required: true
      description: Стабильный slug класса от YOLO.
      schema:
        type: string
        pattern: '^[a-z0-9_]+$'
      example: faberge_egg_coronation

  responses:
    NotFound:
      description: Ресурс не найден.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            detail: Экспонат не найден.
    BadRequest:
      description: Некорректный запрос.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            detail: Не удалось прочитать изображение.
    Unauthorized:
      description: Требуется авторизация администратора.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            detail: Not authenticated
    Conflict:
      description: Конфликт уникальности (например, дубль `label_slug` или номера).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            detail: Экспонат с таким label_slug уже существует.
    PayloadTooLarge:
      description: Файл превышает допустимый размер (10 МБ).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            detail: Размер файла превышает 10 МБ.
    UnsupportedMediaType:
      description: Неподдерживаемый формат файла.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            detail: Поддерживаются только JPEG, PNG и WebP.
    UnprocessableEntity:
      description: Ошибка валидации запроса (формат FastAPI).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/HTTPValidationError'
    UpstreamError:
      description: >-
        Ошибка внешнего сервиса (YOLO / YandexGPT / SpeechKit).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            detail: Сервис распознавания временно недоступен.

  schemas:
    # ── Системное ──
    HealthStatus:
      type: object
      required: [status, version]
      properties:
        status:
          type: string
          enum: [ok, degraded]
          example: ok
        version:
          type: string
          example: 0.1.0-mvp
        time:
          type: string
          format: date-time
          example: '2026-05-30T10:00:00Z'
        dependencies:
          type: object
          description: Доступность внешних зависимостей.
          additionalProperties:
            type: string
            enum: [up, down]
          example:
            postgres: up
            object_storage: up
            yolo: up
            yandexgpt: up
            speechkit: up

    # ── Залы ──
    Hall:
      type: object
      required: [id, hall_number]
      properties:
        id:
          type: integer
          example: 5
        hall_number:
          type: integer
          description: Номер зала на плане экспозиции (уникальный).
          example: 5
        name:
          type: string
          nullable: true
          example: Синяя гостиная
        description:
          type: string
          nullable: true
          description: >-
            Описание зала для уровня зала на карте и для контекста ИИ-гида.
            Наполняется из плана экспозиции и путеводителя.
          example: >-
            Парадная гостиная Шуваловского дворца, где представлены девять
            императорских пасхальных яиц Фаберже.
        level:
          type: integer
          nullable: true
          description: Этаж / уровень в здании музея.
          example: 2
        cover_image_url:
          type: string
          format: uri
          nullable: true
          example: https://cdn.example.cloud/halls/blue/cover.jpg
        showcase_count:
          type: integer
          nullable: true
          example: 6
        exhibit_count:
          type: integer
          nullable: true
          example: 24

    HallBrief:
      type: object
      description: Краткая ссылка на зал (для вложений в карточку экспоната).
      required: [id, hall_number]
      properties:
        id:
          type: integer
          example: 5
        hall_number:
          type: integer
          example: 5
        name:
          type: string
          nullable: true
          example: Синяя гостиная

    HallDetail:
      allOf:
        - $ref: '#/components/schemas/Hall'
        - type: object
          properties:
            showcases:
              type: array
              description: Витрины зала (могут включаться по необходимости).
              items:
                $ref: '#/components/schemas/Showcase'

    MapHall:
      allOf:
        - $ref: '#/components/schemas/Hall'
        - type: object
          properties:
            showcases:
              type: array
              items:
                $ref: '#/components/schemas/Showcase'

    MapResponse:
      type: object
      required: [halls]
      properties:
        halls:
          type: array
          items:
            $ref: '#/components/schemas/MapHall'

    HallListResponse:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Hall'
        total:
          type: integer
          example: 12
        limit:
          type: integer
          example: 20
        offset:
          type: integer
          example: 0

    # ── Витрины ──
    Showcase:
      type: object
      required: [id, hall_id, showcase_number]
      properties:
        id:
          type: integer
          example: 12
        hall_id:
          type: integer
          example: 5
        showcase_number:
          type: integer
          description: Номер витрины внутри зала (уникален в пределах зала).
          example: 3
        name:
          type: string
          nullable: true
          example: Императорские пасхальные яйца
        exhibit_count:
          type: integer
          nullable: true
          example: 4

    ShowcaseBrief:
      type: object
      required: [id, showcase_number]
      properties:
        id:
          type: integer
          example: 12
        showcase_number:
          type: integer
          example: 3

    ShowcaseDetail:
      allOf:
        - $ref: '#/components/schemas/Showcase'
        - type: object
          properties:
            hall:
              $ref: '#/components/schemas/HallBrief'
            exhibits:
              type: array
              items:
                $ref: '#/components/schemas/ExhibitSummary'

    ShowcaseListResponse:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Showcase'
        total:
          type: integer
          example: 6
        limit:
          type: integer
          example: 20
        offset:
          type: integer
          example: 0

    # ── Экспонаты ──
    Image:
      type: object
      required: [id, url]
      properties:
        id:
          type: integer
          description: Идентификатор фото в галерее (для DELETE /admin/exhibits/{id}/media/{image_id}).
          example: 1
        url:
          type: string
          format: uri
          example: https://cdn.example.cloud/exhibits/coronation/main.jpg
        alt:
          type: string
          nullable: true
          example: Коронационное яйцо, общий вид
        width:
          type: integer
          nullable: true
          example: 1600
        height:
          type: integer
          nullable: true
          example: 1600
        is_primary:
          type: boolean
          default: false
          description: Главное фото экспоната (= exhibits.image_url).
          example: true

    ExhibitSummary:
      type: object
      description: Краткое представление экспоната для списков и карусели.
      required: [id, name]
      properties:
        id:
          type: integer
          example: 101
        label_slug:
          type: string
          nullable: true
          example: faberge_egg_coronation
        name:
          type: string
          example: Яйцо «Коронационное»
        year_created:
          type: integer
          nullable: true
          example: 1897
        master_name:
          type: string
          nullable: true
          example: Михаил Перхин
        thumbnail_url:
          type: string
          format: uri
          nullable: true
          example: https://cdn.example.cloud/exhibits/coronation/thumb.jpg
        hall_id:
          type: integer
          nullable: true
          example: 5
        showcase_id:
          type: integer
          nullable: true
          example: 12

    Exhibit:
      type: object
      description: >-
        Полная карточка экспоната для публичного API. Внутреннее поле
        `raw_history` сюда не включается.
      required: [id, name]
      properties:
        id:
          type: integer
          example: 101
        label_slug:
          type: string
          nullable: true
          description: Класс, который возвращает YOLO.
          example: faberge_egg_coronation
        name:
          type: string
          example: Яйцо «Коронационное»
        year_created:
          type: integer
          nullable: true
          example: 1897
        master_name:
          type: string
          nullable: true
          example: Михаил Перхин
        material:
          type: string
          nullable: true
          example: Золото, гильоше-эмаль, бриллианты, рубины
        short_description:
          type: string
          nullable: true
          example: >-
            Пасхальное яйцо-сюрприз, подаренное Николаем II императрице
            Александре Фёдоровне в память о коронации 1896 года.
        image_url:
          type: string
          format: uri
          nullable: true
          description: Главное изображение (Object Storage + CDN).
          example: https://cdn.example.cloud/exhibits/coronation/main.jpg
        images:
          type: array
          description: Галерея изображений.
          items:
            $ref: '#/components/schemas/Image'
        model_3d_url:
          type: string
          format: uri
          nullable: true
          description: Ссылка на 3D-модель Koinovo.
          example: https://koinovo.ru/fabergemuseum/coronation
        model_3d_embed:
          type: string
          nullable: true
          description: HTML/iframe embed-код 3D-модели (когда предоставит Koinovo).
        audio_url:
          type: string
          format: uri
          nullable: true
          description: Предсинтезированная озвучка краткого описания (если есть).
        source_url:
          type: string
          format: uri
          nullable: true
          description: Первоисточник описания на сайте музея.
          example: https://fabergemuseum.ru/kollekczii/shedevryi-kollekczii/
        hall:
          $ref: '#/components/schemas/HallBrief'
        showcase:
          $ref: '#/components/schemas/ShowcaseBrief'

    ExhibitListResponse:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ExhibitSummary'
        total:
          type: integer
          example: 24
        limit:
          type: integer
          example: 20
        offset:
          type: integer
          example: 0

    # ── Поиск ──
    SearchResponse:
      type: object
      required: [query, halls, exhibits]
      properties:
        query:
          type: string
          example: коронационное
        halls:
          type: array
          items:
            $ref: '#/components/schemas/Hall'
        exhibits:
          type: array
          items:
            $ref: '#/components/schemas/ExhibitSummary'
        total:
          type: integer
          description: Суммарное число найденных объектов.
          example: 1

    # ── Распознавание ──
    RecognitionCandidate:
      type: object
      required: [label_slug, confidence]
      properties:
        label_slug:
          type: string
          example: faberge_egg_winter
        name:
          type: string
          nullable: true
          example: Яйцо «Зимнее»
        confidence:
          type: number
          format: float
          minimum: 0
          maximum: 1
          example: 0.41

    RecognitionResponse:
      type: object
      required: [recognized]
      properties:
        recognized:
          type: boolean
          description: Распознан ли экспонат с уверенностью выше порога.
          example: true
        label_slug:
          type: string
          nullable: true
          example: faberge_egg_coronation
        confidence:
          type: number
          format: float
          minimum: 0
          maximum: 1
          nullable: true
          example: 0.94
        exhibit:
          allOf:
            - $ref: '#/components/schemas/Exhibit'
          nullable: true
          description: Найденная карточка (если распознано), иначе `null`.
        candidates:
          type: array
          description: Вероятные классы при неуверенном распознавании.
          items:
            $ref: '#/components/schemas/RecognitionCandidate'
        request_id:
          type: string
          format: uuid
          description: Идентификатор запроса для трассировки.
          example: 7b1c0e2a-9f3d-4a2b-8c10-2a4d6e8f0a11
        processing_ms:
          type: integer
          nullable: true
          example: 312

    # ── ИИ-гид ──
    GuideStyle:
      type: string
      description: Стиль генерируемого рассказа.
      enum: [engaging, historical, short, kids, expert]
      default: engaging

    GuideContext:
      type: object
      description: >-
        Контекст диалога. Укажите хотя бы одно из полей. `exhibit_id`/`label_slug`
        — контекст экспоната, `hall_id` — контекст зала.
      properties:
        exhibit_id:
          type: integer
          nullable: true
          example: 101
        label_slug:
          type: string
          nullable: true
          example: faberge_egg_coronation
        hall_id:
          type: integer
          nullable: true
          example: 5

    StoryRequest:
      type: object
      description: 'Запрос на генерацию рассказа. Укажите `exhibit_id` или `label_slug`.'
      properties:
        exhibit_id:
          type: integer
          nullable: true
          example: 101
        label_slug:
          type: string
          nullable: true
          example: faberge_egg_coronation
        style:
          $ref: '#/components/schemas/GuideStyle'
        language:
          type: string
          default: ru
          description: Язык рассказа (ISO-639-1).
          example: ru
        include_audio:
          type: boolean
          default: false
          description: Сразу синтезировать озвучку и вернуть `audio_url`.
        max_questions:
          type: integer
          minimum: 0
          maximum: 6
          default: 4
          description: Сколько вопросов-подсказок сгенерировать (по ТЗ — 3–4).

    StoryResponse:
      type: object
      required: [text, suggested_questions]
      properties:
        exhibit_id:
          type: integer
          nullable: true
          example: 101
        label_slug:
          type: string
          nullable: true
          example: faberge_egg_coronation
        style:
          $ref: '#/components/schemas/GuideStyle'
        text:
          type: string
          description: Сгенерированный YandexGPT рассказ.
        suggested_questions:
          type: array
          description: 3–4 контекстных вопроса-подсказки для продолжения диалога.
          items:
            type: string
          example:
            - Сколько времени ушло на создание?
            - Кому подарили это яйцо?
            - Что за сюрприз спрятан внутри?
        audio_url:
          type: string
          format: uri
          nullable: true
          description: Озвучка рассказа, если запрошен `include_audio`.
        model:
          type: string
          nullable: true
          example: yandexgpt/latest
        generated_at:
          type: string
          format: date-time
          nullable: true

    ChatMessage:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [user, assistant, system]
          example: user
        content:
          type: string
          example: Кому подарили это яйцо?

    ChatRequest:
      type: object
      required: [message]
      properties:
        session_id:
          type: string
          format: uuid
          nullable: true
          description: Идентификатор диалога. Если не задан — сервер создаст новый.
          example: 2f6a9b3c-1d4e-4f8a-9c2b-5e7a1d0c3b66
        context:
          $ref: '#/components/schemas/GuideContext'
        message:
          type: string
          minLength: 1
          description: Сообщение пользователя (часто — одна из подсказок).
          example: Кому подарили это яйцо?
        history:
          type: array
          description: Опциональная история сообщений (если не используется session_id).
          items:
            $ref: '#/components/schemas/ChatMessage'
        language:
          type: string
          default: ru
          example: ru
        max_questions:
          type: integer
          minimum: 0
          maximum: 6
          default: 3

    ChatResponse:
      type: object
      required: [session_id, answer, suggested_questions]
      properties:
        session_id:
          type: string
          format: uuid
          example: 2f6a9b3c-1d4e-4f8a-9c2b-5e7a1d0c3b66
        answer:
          type: string
        suggested_questions:
          type: array
          items:
            type: string
        context:
          $ref: '#/components/schemas/GuideContext'

    # ── Озвучивание ──
    SpeechVoice:
      type: string
      description: Голос Yandex SpeechKit.
      enum: [alena, filipp, jane, omazh, zahar, ermil]
      default: alena

    AudioFormat:
      type: string
      enum: [mp3, oggopus, wav]
      default: mp3

    SpeechRequest:
      type: object
      description: 'Запрос синтеза речи. Укажите `text` или `exhibit_id`.'
      properties:
        text:
          type: string
          nullable: true
          description: Текст для озвучивания.
        exhibit_id:
          type: integer
          nullable: true
          description: Озвучить краткое описание экспоната.
          example: 101
        voice:
          $ref: '#/components/schemas/SpeechVoice'
        format:
          $ref: '#/components/schemas/AudioFormat'
        speed:
          type: number
          format: float
          minimum: 0.1
          maximum: 3.0
          default: 1.0
          example: 1.0
        emotion:
          type: string
          enum: [neutral, good, evil]
          default: neutral

    SpeechResponse:
      type: object
      required: [audio_url, format, voice]
      properties:
        audio_url:
          type: string
          format: uri
          example: https://cdn.example.cloud/tts/coronation_alena.mp3
        format:
          $ref: '#/components/schemas/AudioFormat'
        voice:
          $ref: '#/components/schemas/SpeechVoice'
        duration_ms:
          type: integer
          nullable: true
          example: 21400
        characters:
          type: integer
          nullable: true
          description: Сколько символов синтезировано (для учёта квот SpeechKit).
          example: 248
        cached:
          type: boolean
          nullable: true
          description: Отдано ли аудио из кэша Object Storage.
          example: true

    # ── Администрирование ──
    HallCreate:
      type: object
      required: [hall_number]
      properties:
        hall_number:
          type: integer
          example: 5
        name:
          type: string
          nullable: true
          example: Синяя гостиная
        description:
          type: string
          nullable: true
        level:
          type: integer
          nullable: true
          example: 2

    HallPatch:
      type: object
      description: Частичное обновление зала — переданы только изменяемые поля.
      properties:
        hall_number:
          type: integer
          nullable: true
          example: 5
        name:
          type: string
          nullable: true
          example: Синяя гостиная
        description:
          type: string
          nullable: true
        level:
          type: integer
          nullable: true
          example: 2
        cover_image_url:
          type: string
          format: uri
          nullable: true
          example: https://cdn.example.cloud/halls/blue/cover.jpg

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          example: admin
        password:
          type: string
          format: password
          example: admin

    LoginResponse:
      type: object
      required: [access_token, token_type]
      properties:
        access_token:
          type: string
          description: Bearer-токен администратора (слать в Authorization ко всем /admin/**).
          example: dev-admin-token
        token_type:
          type: string
          default: bearer
          example: bearer

    ShowcaseCreate:
      type: object
      required: [hall_id, showcase_number]
      properties:
        hall_id:
          type: integer
          example: 5
        showcase_number:
          type: integer
          example: 3
        name:
          type: string
          nullable: true

    ExhibitCreate:
      type: object
      required: [showcase_id, name]
      properties:
        showcase_id:
          type: integer
          example: 12
        label_slug:
          type: string
          nullable: true
          pattern: '^[a-z0-9_]+$'
          example: faberge_egg_winter
        name:
          type: string
          example: Яйцо «Зимнее»
        year_created:
          type: integer
          nullable: true
          example: 1913
        master_name:
          type: string
          nullable: true
          example: Альма Пиль
        material:
          type: string
          nullable: true
          example: Горный хрусталь, платина, бриллианты
        short_description:
          type: string
          nullable: true
        raw_history:
          type: string
          nullable: true
          description: >-
            Внутренние факты для генерации рассказа LLM. Рекомендуется хранить
            буллитами или в JSON. Через публичный API не отдаётся.
          example: >-
            Заказчик — Николай II. Подарок императрице Марии Фёдоровне.
            Дизайн — Альма Пиль. Горный хрусталь и бриллианты. Сюрприз —
            корзина подснежников.
        image_url:
          type: string
          format: uri
          nullable: true
        model_3d_url:
          type: string
          format: uri
          nullable: true

    ExhibitUpdate:
      allOf:
        - $ref: '#/components/schemas/ExhibitCreate'
      description: Полная замена полей экспоната (PUT).

    ExhibitPatch:
      type: object
      description: Частичное обновление — все поля необязательны.
      properties:
        showcase_id:
          type: integer
        label_slug:
          type: string
          pattern: '^[a-z0-9_]+$'
        name:
          type: string
        year_created:
          type: integer
          nullable: true
        master_name:
          type: string
          nullable: true
        material:
          type: string
          nullable: true
        short_description:
          type: string
          nullable: true
        raw_history:
          type: string
          nullable: true
        image_url:
          type: string
          format: uri
          nullable: true
        model_3d_url:
          type: string
          format: uri
          nullable: true

    ExhibitAdmin:
      allOf:
        - $ref: '#/components/schemas/Exhibit'
        - type: object
          description: Админское представление — включает внутреннее `raw_history`.
          properties:
            raw_history:
              type: string
              nullable: true
              example: >-
                Заказчик — Николай II. Подарок императрице Марии Фёдоровне.

    MediaUploadResponse:
      type: object
      required: [image_id, image_url, object_key]
      properties:
        image_id:
          type: integer
          description: Id созданной записи галереи (для DELETE /admin/exhibits/{id}/media/{image_id}).
          example: 4
        image_url:
          type: string
          format: uri
          example: https://cdn.example.cloud/exhibits/winter/main.jpg
        thumbnail_url:
          type: string
          format: uri
          nullable: true
          description: Сейчас совпадает с image_url — отдельная миниатюра не генерируется.
          example: https://cdn.example.cloud/exhibits/winter/main.jpg
        object_key:
          type: string
          description: Ключ объекта в Yandex Object Storage.
          example: exhibits/winter/main.jpg

    AnalyticsTopItem:
      type: object
      properties:
        id:
          type: integer
          example: 101
        name:
          type: string
          example: Яйцо «Коронационное»
        count:
          type: integer
          example: 187

    AnalyticsOverview:
      type: object
      properties:
        from:
          type: string
          format: date
          nullable: true
          example: '2026-05-25'
        to:
          type: string
          format: date
          nullable: true
          example: '2026-06-25'
        total_sessions:
          type: integer
          example: 1240
        total_recognitions:
          type: integer
          example: 980
        recognition_success_rate:
          type: number
          format: float
          minimum: 0
          maximum: 1
          example: 0.86
        total_chat_messages:
          type: integer
          example: 3450
        total_audio_plays:
          type: integer
          example: 1120
        top_exhibits:
          type: array
          items:
            $ref: '#/components/schemas/AnalyticsTopItem'
        top_halls:
          type: array
          items:
            $ref: '#/components/schemas/AnalyticsTopItem'

    # ── Телеметрия ──
    Event:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum:
            - app_open
            - hall_view
            - showcase_view
            - exhibit_view
            - recognition
            - chat_message
            - audio_play
            - suggestion_click
          example: exhibit_view
        exhibit_id:
          type: integer
          nullable: true
        hall_id:
          type: integer
          nullable: true
        label_slug:
          type: string
          nullable: true
        ts:
          type: string
          format: date-time
          nullable: true
        props:
          type: object
          nullable: true
          additionalProperties: true

    EventBatch:
      type: object
      required: [events]
      properties:
        session_id:
          type: string
          format: uuid
          nullable: true
        events:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/Event'

    # ── Ошибки (формат FastAPI) ──
    Error:
      type: object
      description: Стандартная ошибка приложения (FastAPI `HTTPException`).
      required: [detail]
      properties:
        detail:
          type: string
          example: Экспонат не найден.

    ValidationErrorItem:
      type: object
      required: [loc, msg, type]
      properties:
        loc:
          type: array
          items:
            oneOf:
              - type: string
              - type: integer
          example: [body, message]
        msg:
          type: string
          example: field required
        type:
          type: string
          example: value_error.missing

    HTTPValidationError:
      type: object
      description: Ошибка валидации запроса в формате FastAPI.
      properties:
        detail:
          type: array
          items:
            $ref: '#/components/schemas/ValidationErrorItem'
