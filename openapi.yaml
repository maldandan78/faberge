      description: >-
        Проверяет логин/пароль (`ADMIN_USERNAME` / `ADMIN_PASSWORD`) и возвращает
        Bearer-токен администратора. Полученный `access_token` нужно слать в
        заголовке `Authorization: Bearer <access_token>` ко всем `/admin/**`.
        Токен статический (не истекает) — соответствует MVP с единственным
        администратором. Эндпоинт открытый (без авторизации).
      operationId: adminLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              username: admin
              password: admin
      responses:
        '200':
          description: Успешный вход — Bearer-токен администратора.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              example:
                access_token: dev-admin-token
                token_type: bearer
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

