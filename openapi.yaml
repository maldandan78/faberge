openapi: 3.0.3

info:
  title: API ИИ-гида музея Фаберже
  version: 0.1.0-mvp
  description: |
    Backend-API мобильного web-приложения (PWA) «ИИ-гид музея Фаберже».

    Посетитель сканирует **QR-код** на входе экспозиции, попадает в приложение
    без регистрации и установки, перемещается по **интерактивной карте**
    (зал → витрина → экспонат), а главное — может **сфотографировать экспонат**,
    получить о нём рассказ от ИИ-гида и **прослушать** его озвучку.

    Этот документ описывает контракт backend-сервиса (FastAPI на Yandex Cloud),
    к которому обращается фронтенд. Спецификация написана по дорожной карте MVP
    (25 мая – 25 июня) и служит единым контрактом между Frontend, Backend и ML.

    ## Ключевой пользовательский сценарий (бесшовное распознавание)

    ```
    Клик «Распознать экспонат»
      → камера (WebRTC)
      → снимок
      → POST /recognition (фото → YOLO → label_slug)
      → POST /guide/story (label_slug → raw_history из БД → YandexGPT → рассказ)
      → показ рассказа + 3–4 всплывающих вопроса
      → POST /speech («Прослушать», SpeechKit → аудио)
      → блок «Другие экспонаты зала» (GET /exhibits/{id}/related)
    ```

    ## Доменная модель

    Иерархия каталога повторяет физическую структуру музея:

    | Уровень   | Сущность   | Таблица БД   | Ключевые поля                                   |
    |-----------|------------|--------------|-------------------------------------------------|
    | 1         | Зал        | `halls`      | `hall_number`, `name`, описание                 |
    | 2         | Витрина    | `showcases`  | `hall_id`, `showcase_number`                    |
    | 3         | Экспонат   | `exhibits`   | `label_slug`, `name`, `year_created`, `master_name`, `material`, `short_description`, `raw_history` |

    `label_slug` — стабильный идентификатор класса, который возвращает модель YOLO
    (например, `faberge_egg_winter`). По нему ML-пайплайн и LLM связывают фото
    с записью в БД. `raw_history` — внутренние факты для генерации рассказа
    (через публичный API не отдаётся).

    ## Технологический стек (Yandex Cloud)

    | Слой              | Технология                                  |
    |-------------------|---------------------------------------------|
    | API / backend     | Python + FastAPI, Yandex API Gateway        |
    | База данных       | Yandex Managed Service for PostgreSQL       |
    | Хранилище медиа   | Yandex Object Storage + Cloud CDN           |
    | Бизнес-логика ML  | Yandex Cloud Functions                      |
    | Детекция по фото  | YOLO (обучение — Datasphere, деплой — Cloud)|
    | Генерация текста  | YandexGPT                                    |
    | Синтез речи       | Yandex SpeechKit                            |
    | 3D-модели         | Koinovo (embed) + Three.js/WebGL на фронте  |

    ## Группы эндпоинтов

    - **Система** — health-check для API Gateway и мониторинга.
    - **Карта и навигация** — интерактивная карта и уровни зал → витрина → экспонат.
    - **Экспонаты** — карточка экспоната и блок «Другие экспонаты зала».
    - **Поиск** — поисковая строка по названиям залов и экспонатов.
    - **Распознавание** — приём фото и маршрутизация в YOLO.
    - **ИИ-гид** — генерация рассказа (YandexGPT) и диалог с подсказками.
    - **Озвучивание** — синтез речи (SpeechKit) для кнопки «Прослушать».
    - **Администрирование** *(вне MVP)* — CRUD экспонатов и аналитика.
    - **Телеметрия** *(вне MVP)* — сбор событий для аналитики.

    ## Аутентификация

    Публичные эндпоинты (всё, что нужно посетителю) **открыты** — приложение
    работает по QR без регистрации. Эндпоинты `/admin/**` защищены
    **Bearer-токеном** (`bearerAuth`) и относятся к этапу «вне MVP».

    ## Формат ошибок

    Сервис следует конвенции FastAPI: ошибки уровня приложения возвращаются как
    `{ "detail": "..." }`, ошибки валидации запроса — `422` с массивом
    `detail[]` (`HTTPValidationError`). Сбои внешних сервисов (YOLO / YandexGPT /
    SpeechKit) отдаются как `502` (`UpstreamError`).

    ## Источники данных для наполнения БД

    - План экспозиции с картой залов: https://fabergemuseum.ru/posetitelyam/plan-ekspozitsii
    - Путеводитель (PDF, полное описание залов и экспонатов): http://fabergemuseum.ru/image/pdf/faberge_expo.pdf
    - Шедевры коллекции (фото + подробное описание): https://fabergemuseum.ru/kollekczii/shedevryi-kollekczii/
    - 3D-модели экспонатов (Koinovo): https://koinovo.ru/fabergemuseum

    > Условные обозначения: операции, помеченные тегом **«вне MVP»**, не входят в
    > спринт 25 мая – 25 июня и описаны для целостности контракта.
  x-version-note: MVP-контракт, может меняться по ходу спринта.
  contact:
    name: Команда ИИ-гида музея Фаберже
    url: https://fabergemuseum.ru
  license:
    name: Proprietary — внутренний документ проекта
    url: https://fabergemuseum.ru

externalDocs:
  description: Шедевры коллекции (эталон наполнения карточки экспоната)
  url: https://fabergemuseum.ru/kollekczii/shedevryi-kollekczii/

servers:
  - url: https://{gatewayId}.apigw.yandexcloud.net
    description: Production — Yandex API Gateway
    variables:
      gatewayId:
        default: d5dexampleexample00
        description: Идентификатор развёрнутого Yandex API Gateway
  - url: http://localhost:8000
    description: Локальная разработка (FastAPI + uvicorn)
  - url: http://localhost:8080
    description: Локальный мок (Swagger UI / Prism)

tags:
  - name: Система
    description: Служебные эндпоинты — health-check и мониторинг.
  - name: Карта и навигация
    description: >-
      Интерактивная карта музея и навигация по уровням
      зал → витрина → экспонат.
  - name: Экспонаты
    description: >-
      Данные карточки экспоната (фото, 3D, год, мастер, материалы)
      и блок «Другие экспонаты зала».
  - name: Поиск
    description: Поисковая строка по названиям залов и экспонатов.
  - name: Распознавание
    description: >-
      Приём фото от фронтенда и маршрутизация запроса к модели YOLO
      (этап 8–22 июня).
  - name: ИИ-гид
    description: >-
      Генерация рассказа об экспонате (YandexGPT) и диалог с
      контекстными вопросами-подсказками.
  - name: Озвучивание
    description: Синтез речи (Yandex SpeechKit) для кнопки «Прослушать».
  - name: Администрирование
    description: '[Вне MVP] CRUD экспонатов и административная аналитика.'
  - name: Телеметрия
    description: '[Вне MVP] Приём пользовательских событий для аналитики.'

x-tagGroups:
  - name: MVP (25 мая – 25 июня)
    tags:
      - Система
      - Карта и навигация
      - Экспонаты
      - Поиск
      - Распознавание
      - ИИ-гид
      - Озвучивание
  - name: Дальнейшие шаги (вне MVP)
    tags:
      - Администрирование
      - Телеметрия

# По умолчанию эндпоинты публичные; admin переопределяет на уровне операции.
security: []

paths:
  # ─────────────────────────────── Система ───────────────────────────────
  /health:
    get:
      tags: [Система]
      summary: Health-check
      description: >-
        Проверка живости сервиса и доступности внешних зависимостей
        (PostgreSQL, Object Storage, YOLO, YandexGPT, SpeechKit).
        Используется API Gateway и системой мониторинга.
      operationId: getHealth
      security: []
      responses:
        '200':
          description: Сервис работает.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
        '503':
          description: Сервис деградирован — недоступна критичная зависимость.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'

  # ──────────────────────── Карта и навигация ────────────────────────────
  /map:
    get:
      tags: [Карта и навигация]
      summary: Интерактивная карта музея
      description: >-
        Полное дерево экспозиции для отрисовки интерактивной карты:
        залы с вложенными витринами и счётчиками экспонатов.
        Один запрос на загрузку карты на первом экране.
      operationId: getMap
      security: []
      responses:
        '200':
          description: Дерево залов и витрин.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MapResponse'

  /halls:
    get:
      tags: [Карта и навигация]
      summary: Список залов
      description: Постраничный список залов музея для карты и навигации.
      operationId: listHalls
      security: []
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Список залов.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HallListResponse'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /halls/{hall_id}:
    get:
      tags: [Карта и навигация]
      summary: Получить зал
      description: >-
        Карточка зала с описанием и кнопкой «Спросить AI-гида» на фронте.
        Описание зала используется на уровне зала интерактивной карты.
      operationId: getHall
      security: []
      parameters:
        - $ref: '#/components/parameters/HallId'
      responses:
        '200':
          description: Данные зала.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HallDetail'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /halls/{hall_id}/showcases:
    get:
      tags: [Карта и навигация]
      summary: Витрины зала
      description: Список витрин внутри указанного зала.
      operationId: listHallShowcases
      security: []
      parameters:
        - $ref: '#/components/parameters/HallId'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Список витрин зала.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShowcaseListResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /halls/{hall_id}/exhibits:
    get:
      tags: [Карта и навигация]
      summary: Экспонаты зала
      description: >-
        Все экспонаты зала (по всем его витринам). Эта же выборка лежит в
        основе блока «Другие экспонаты зала» — соседние записи по `hall_id`.
      operationId: listHallExhibits
      security: []
      parameters:
        - $ref: '#/components/parameters/HallId'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Список экспонатов зала.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExhibitListResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /showcases:
    get:
      tags: [Карта и навигация]
      summary: Список / фильтрация витрин
      description: >-
        Плоский постраничный список витрин по всем залам, с необязательным
        фильтром по `hall_id`. Универсальная выборка для админки и навигации
        (формат ответа — как у `/halls` и `/exhibits`).
      operationId: listShowcases
      security: []
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - name: hall_id
          in: query
          description: Фильтр по идентификатору зала.
          required: false
          schema:
            type: integer
            minimum: 1
          example: 5
      responses:
        '200':
          description: Список витрин.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShowcaseListResponse'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /showcases/{showcase_id}:
    get:
      tags: [Карта и навигация]
      summary: Получить витрину
      operationId: getShowcase
      security: []
      parameters:
        - $ref: '#/components/parameters/ShowcaseId'
      responses:
        '200':
          description: Данные витрины.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShowcaseDetail'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /showcases/{showcase_id}/exhibits:
    get:
      tags: [Карта и навигация]
      summary: Экспонаты витрины
      operationId: listShowcaseExhibits
      security: []
      parameters:
        - $ref: '#/components/parameters/ShowcaseId'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Список экспонатов витрины.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExhibitListResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  # ─────────────────────────── Экспонаты ─────────────────────────────────
  /exhibits:
    get:
      tags: [Экспонаты]
      summary: Список / фильтрация экспонатов
      description: >-
        Постраничный список экспонатов с фильтрами по залу, витрине,
        `label_slug` и подстроке названия. Универсальная выборка для каталога.
      operationId: listExhibits
      security: []
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - name: hall_id
          in: query
          description: Фильтр по идентификатору зала.
          required: false
          schema:
            type: integer
            minimum: 1
          example: 5
        - name: showcase_id
          in: query
          description: Фильтр по идентификатору витрины.
          required: false
          schema:
            type: integer
            minimum: 1
        - name: label_slug
          in: query
          description: Фильтр по точному `label_slug` (то, что возвращает YOLO).
          required: false
          schema:
            type: string
          example: faberge_egg_coronation
        - name: q
          in: query
          description: Поиск по подстроке названия экспоната.
          required: false
          schema:
            type: string
          example: яйцо
      responses:
        '200':
          description: Список экспонатов.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExhibitListResponse'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /exhibits/{exhibit_id}:
    get:
      tags: [Экспонаты]
      summary: Карточка экспоната
      description: >-
        Полные данные карточки: фото, 3D-модель (Koinovo), краткое описание
        (год, мастер, материалы), ссылки на зал и витрину. Поле `raw_history`
        в публичный ответ не включается.
      operationId: getExhibit
      security: []
      parameters:
        - $ref: '#/components/parameters/ExhibitId'
      responses:
        '200':
          description: Карточка экспоната.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Exhibit'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /exhibits/by-slug/{label_slug}:
    get:
      tags: [Экспонаты]
      summary: Экспонат по label_slug
      description: >-
        Получение карточки по `label_slug` — удобно сразу после распознавания,
        когда YOLO вернул класс, но `exhibit_id` ещё неизвестен фронтенду.
      operationId: getExhibitBySlug
      security: []
      parameters:
        - $ref: '#/components/parameters/LabelSlug'
      responses:
        '200':
          description: Карточка экспоната.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Exhibit'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /exhibits/{exhibit_id}/related:
    get:
      tags: [Экспонаты]
      summary: Другие экспонаты зала
      description: >-
        Соседние экспонаты того же зала (по `hall_id`), исключая текущий.
        Питает блок «Другие экспонаты зала» внизу карточки — карусель/сетку
        кликабельных фото для удержания посетителя в каталоге.
      operationId: listRelatedExhibits
      security: []
      parameters:
        - $ref: '#/components/parameters/ExhibitId'
        - name: limit
          in: query
          description: Сколько соседних экспонатов вернуть.
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 12
      responses:
        '200':
          description: Соседние экспонаты зала.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExhibitListResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  # ───────────────────────────── Поиск ───────────────────────────────────
  /search:
    get:
      tags: [Поиск]
      summary: Поиск по залам и экспонатам
      description: >-
        Поисковая строка интерактивной карты: ищет совпадения в названиях
        залов и экспонатов. Возвращает две раздельные коллекции результатов.
      operationId: search
      security: []
      parameters:
        - name: q
          in: query
          description: Поисковый запрос (название зала или экспоната).
          required: true
          schema:
            type: string
            minLength: 1
          example: коронационное
        - name: limit
          in: query
          description: Максимум результатов в каждой коллекции.
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
      responses:
        '200':
          description: Результаты поиска.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  # ─────────────────────────── Распознавание ─────────────────────────────
  /recognition:
    post:
      tags: [Распознавание]
      summary: Распознать экспонат по фото
      description: |
        Принимает фотографию экспоната, отправляет её в развёрнутую на
        Yandex Cloud модель **YOLO** и возвращает распознанный `label_slug`
        вместе с найденной в БД карточкой экспоната.

        Сразу после снимка фронтенд бесшовно переходит в окно чата с
        состоянием загрузки и вызывает этот эндпоинт. При успешном
        распознавании далее обычно вызывается `POST /guide/story`.

        Если уверенность ниже порога — `recognized = false`; в `candidates`
        могут вернуться наиболее вероятные классы для уточнения.
      operationId: recognizeExhibit
      security: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: Фото экспоната (JPEG/PNG/WebP, до 10 МБ).
                hall_id:
                  type: integer
                  minimum: 1
                  description: >-
                    Необязательная подсказка о текущем зале (по карте) —
                    повышает точность и сужает поиск.
                top_k:
                  type: integer
                  minimum: 1
                  maximum: 10
                  default: 3
                  description: Сколько кандидатов вернуть при неуверенном распознавании.
            encoding:
              file:
                contentType: image/jpeg, image/png, image/webp
      responses:
        '200':
          description: Результат распознавания (успех или «не распознано»).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecognitionResponse'
              examples:
                recognized:
                  summary: Экспонат распознан
                  value:
                    recognized: true
                    label_slug: faberge_egg_coronation
                    confidence: 0.94
